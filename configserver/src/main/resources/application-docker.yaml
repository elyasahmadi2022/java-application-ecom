spring:
  application:
    name: configserver
  rabbitmq:
    port: ${RABBITMQ_PORT}
    host: ${RABBITMQ_HOST}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
server:
  port: 8888
management:
  endpoints:
    web:
      exposure:
        include: '*'
