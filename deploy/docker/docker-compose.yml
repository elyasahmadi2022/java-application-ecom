services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: product
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d product"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: userdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5252:80"
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8444:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      # Keycloak image may not have curl; use bash TCP check instead
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/2181 && echo srvr >&3 && head -n 1 <&3 | grep -qi zookeeper'"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners: internal for containers, external for host
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Single broker safety
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  config-server:
    build: ../../configserver
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - backend
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,native
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_PASSWORD: guest
      RABBITMQ_USERNAME: guest
    volumes:
      - ./../../configserver/src/main/resources/config:/config:ro
    restart: unless-stopped
    healthcheck:
      # curl may not exist in your image; prefer TCP check OR add curl in Dockerfile
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/8888'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  eureka-server:
    build: ../../eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - backend
    depends_on:
      config-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/8761'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  user-server:
    build: ../../user
    container_name: user-server
    ports:
      - "8081:8081"
    networks:
      - backend
    depends_on:
      config-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGO_URI: mongodb://mongodb:27017/userdb
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_PASSWORD: guest
      RABBITMQ_USERNAME: guest

      # Make sure these match what your app expects / Keycloak actually has
      KEYCLOAK_ADMIN_USERNAME: user
      KEYCLOAK_ADMIN_PASSWORD: user123
      KEYCLOAK_ADMIN_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_REALM: app-gateway
      KEYCLOAK_ADMIN_CLIENT_ID: ecom-app-client-pkce
      KEYCLOAK_ADMIN_CLIENT_UID: 31647329-82fc-449d-8097-40b710f33fb2
    restart: unless-stopped

  product-server:
    build: ../../product
    container_name: product-server
    ports:
      - "8082:8082"
    networks:
      - backend
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      USER_NAME: admin
      USER_PASSWORD: admin
      DB_URL: jdbc:postgresql://postgres:5432/product
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_PASSWORD: guest
      RABBITMQ_USERNAME: guest
    restart: unless-stopped
  order-server:
    container_name: order-server
    build: ../../order
    ports:
      - "8083:8083"
    networks:
      - backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL_ORDER: jdbc:postgresql://postgres:5432/order
      USER_NAME: admin
      USER_PASSWORD: admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_PASSWORD: guest
      RABBITMQ_USERNAME: guest
      RABBITMQ_EXCHANGE_NAME: order.exchange
      RABBITMQ_QUEUE_NAME: order.queue
      RABBITMQ_ROUTING_KEY: order.tracking
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
  gateway:
    container_name: gateway-server
    build: ../../gateway
    ports:
      - "8080:8080"
    networks:
      - backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - config-server
      - eureka-server
      - user-server
      - product-server
      - order-server
    restart: unless-stopped
networks:
  backend:
    driver: bridge
volumes:
  postgres_data:
  mongo_data:
  pgadmin_data:
  keycloak_data: